name: Train Prediction Models

on:
  schedule:
    # Monday 06:00 UTC — after a race weekend's results are published, so the
    # model always reflects current-season form (recency-weighted).
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      seasons:
        description: "Space-separated seasons to train on (empty = last 5 incl. current)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Train race + pole models
        run: |
          mkdir -p models_cache
          SEASONS="${{ github.event.inputs.seasons }}"
          if [ -z "$SEASONS" ]; then
            # backend.train defaults to the last 5 seasons incl. current,
            # with recency weighting
            python -m backend.train
          else
            echo "Training on seasons: $SEASONS"
            python -m backend.train --seasons $SEASONS
          fi

      - name: Commit trained models
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models_cache/race_predictor.pkl models_cache/pole_predictor.pkl
          if git diff --cached --quiet; then
            echo "No model changes to commit"
            exit 0
          fi
          git commit -m "chore: retrain prediction models [skip ci]"
          # The predict workflow may have pushed to main while training was
          # running. Rebase onto the latest main before pushing, retry once.
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main
            if git push origin main; then
              exit 0
            fi
            echo "push attempt $attempt failed, retrying..."
            sleep 5
          done
          echo "push failed after 3 attempts"
          exit 1
