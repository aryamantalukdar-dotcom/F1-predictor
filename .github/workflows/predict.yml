name: Generate F1 Prediction

on:
  schedule:
    # Hourly on Fri/Sat/Sun so the page refreshes within ~1h of each
    # practice/qualifying/sprint/race session ending.
    - cron: "0 * * * 5,6,0"
    # Lighter every-6-hours cadence Mon-Thu when there's no track action.
    - cron: "0 */6 * * 1-4"
  workflow_dispatch:
    # Also allows manual "Run workflow" button in the Actions tab

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Generate static prediction page
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python -m scripts.generate_static --out docs/index.html

      - name: Commit updated prediction
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "No prediction changes to commit"
            exit 0
          fi
          git commit -m "chore: update F1 prediction [skip ci]"
          # Rebase + retry in case another workflow run pushed to main while we
          # were generating (train workflow can take ~3 min and clash).
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main
            if git push origin main; then
              exit 0
            fi
            echo "push attempt $attempt failed, retrying..."
            sleep 5
          done
          exit 1
