name: Generate F1 Prediction

on:
  schedule:
    # Run every 6 hours — predictions refresh throughout the race weekend
    - cron: "0 */6 * * *"
  workflow_dispatch:
    # Also allows manual "Run workflow" button in the Actions tab

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Generate static prediction page
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m scripts.generate_static --out docs/index.html

      - name: Commit updated prediction
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          # Only commit if anything changed
          git diff --cached --quiet || git commit -m "chore: update F1 prediction [skip ci]"
          git push
